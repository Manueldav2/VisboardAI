<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1b19"/>
      <stop offset="100%" stop-color="#161514"/>
    </linearGradient>
    <linearGradient id="gold" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#f0d060"/>
      <stop offset="50%" stop-color="#d4a64a"/>
      <stop offset="100%" stop-color="#b8923d"/>
    </linearGradient>
    <linearGradient id="goldLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d060"/>
      <stop offset="100%" stop-color="#d4a64a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Ambient glow behind network -->
  <ellipse cx="256" cy="256" rx="160" ry="160" fill="#d4a64a" opacity="0.04" filter="url(#softGlow)"/>

  <!-- Connection lines (edges) — drawn first, behind nodes -->
  <g stroke="url(#gold)" stroke-linecap="round" opacity="0.35" stroke-width="2">
    <!-- Central hub connections -->
    <line x1="256" y1="240" x2="170" y2="155"/>
    <line x1="256" y1="240" x2="342" y2="155"/>
    <line x1="256" y1="240" x2="145" y2="280"/>
    <line x1="256" y1="240" x2="367" y2="280"/>
    <line x1="256" y1="240" x2="190" y2="360"/>
    <line x1="256" y1="240" x2="322" y2="360"/>
    <!-- Outer ring connections -->
    <line x1="170" y1="155" x2="342" y2="155"/>
    <line x1="145" y1="280" x2="190" y2="360"/>
    <line x1="367" y1="280" x2="322" y2="360"/>
    <line x1="170" y1="155" x2="145" y2="280"/>
    <line x1="342" y1="155" x2="367" y2="280"/>
    <line x1="190" y1="360" x2="322" y2="360"/>
  </g>

  <!-- Secondary thin connections for complexity -->
  <g stroke="#d4a64a" stroke-linecap="round" opacity="0.15" stroke-width="1.5">
    <line x1="170" y1="155" x2="367" y2="280"/>
    <line x1="342" y1="155" x2="145" y2="280"/>
    <line x1="145" y1="280" x2="322" y2="360"/>
    <line x1="367" y1="280" x2="190" y2="360"/>
  </g>

  <!-- Central node — largest, the "brain" hub -->
  <circle cx="256" cy="240" r="28" fill="url(#goldLight)" opacity="0.95" filter="url(#nodeGlow)"/>
  <circle cx="256" cy="240" r="14" fill="#161514" opacity="0.6"/>

  <!-- Primary outer nodes -->
  <circle cx="170" cy="155" r="18" fill="url(#goldLight)" opacity="0.85" filter="url(#glow)"/>
  <circle cx="170" cy="155" r="8" fill="#161514" opacity="0.5"/>

  <circle cx="342" cy="155" r="18" fill="url(#goldLight)" opacity="0.85" filter="url(#glow)"/>
  <circle cx="342" cy="155" r="8" fill="#161514" opacity="0.5"/>

  <circle cx="145" cy="280" r="16" fill="url(#goldLight)" opacity="0.8" filter="url(#glow)"/>
  <circle cx="145" cy="280" r="7" fill="#161514" opacity="0.5"/>

  <circle cx="367" cy="280" r="16" fill="url(#goldLight)" opacity="0.8" filter="url(#glow)"/>
  <circle cx="367" cy="280" r="7" fill="#161514" opacity="0.5"/>

  <circle cx="190" cy="360" r="15" fill="url(#goldLight)" opacity="0.75" filter="url(#glow)"/>
  <circle cx="190" cy="360" r="6.5" fill="#161514" opacity="0.5"/>

  <circle cx="322" cy="360" r="15" fill="url(#goldLight)" opacity="0.75" filter="url(#glow)"/>
  <circle cx="322" cy="360" r="6.5" fill="#161514" opacity="0.5"/>

  <!-- Tiny accent nodes on some edges -->
  <circle cx="213" cy="197" r="4" fill="#f0d060" opacity="0.5"/>
  <circle cx="299" cy="197" r="4" fill="#f0d060" opacity="0.5"/>
  <circle cx="200" cy="260" r="3.5" fill="#f0d060" opacity="0.4"/>
  <circle cx="312" cy="260" r="3.5" fill="#f0d060" opacity="0.4"/>
  <circle cx="223" cy="300" r="3" fill="#f0d060" opacity="0.35"/>
  <circle cx="289" cy="300" r="3" fill="#f0d060" opacity="0.35"/>
</svg>
